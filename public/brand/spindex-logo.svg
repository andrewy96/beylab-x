<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="SPINDEX logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1117"/>
      <stop offset="1" stop-color="#06080b"/>
    </linearGradient>
    <filter id="xGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <text x="512" y="565" text-anchor="middle" fill="#e8eef4" font-family="Bahnschrift, Orbitron, Segoe UI, Arial, sans-serif" font-size="126" font-weight="700" letter-spacing="11">SPINDE</text>
  <text x="788" y="565" text-anchor="start" fill="#00e58f" font-family="Bahnschrift, Orbitron, Segoe UI, Arial, sans-serif" font-size="126" font-weight="700" letter-spacing="0" filter="url(#xGlow)">X</text>
</svg>
