<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="274" viewBox="0 0 1080 274" role="img" aria-label="SPINDEX wordmark">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1117"/>
      <stop offset="1" stop-color="#06080b"/>
    </linearGradient>
    <filter id="xGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1080" height="274" fill="url(#bg)"/>
  <text x="66" y="170" fill="#e8eef4" font-family="Bahnschrift, Orbitron, Segoe UI, Arial, sans-serif" font-size="102" font-weight="700" letter-spacing="9">SPINDE</text>
  <text x="506" y="170" fill="#00e58f" font-family="Bahnschrift, Orbitron, Segoe UI, Arial, sans-serif" font-size="102" font-weight="700" filter="url(#xGlow)">X</text>
</svg>
